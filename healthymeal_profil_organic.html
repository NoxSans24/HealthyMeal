<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HealthyMeal - Profil</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

    <style>
        /* ============================================
           ROOT VARIABLES
           ============================================ */
        :root {
            --font-sans: 'Poppins', sans-serif;

            /* Colors */
            --border: #E5E7EB;
            --border-strong: #D1D5DB;

            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;

            --background: #FAF8F2;
            --success-green: #1B5E20;
            --light-green: #4CAF50;
            --light-green-bg: #E8F5E9;
            --orange: #FFA726;
            --danger: #D85A30;
        }

        /* ============================================
           RESET & GLOBAL STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8e8e8;
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ============================================
           APP CONTAINER
           ============================================ */
        .app-container {
            width: 100%;
            max-width: 375px;
            background: var(--background);
            border-radius: 36px;
            border: 0.5px solid var(--border);
            overflow: hidden;
            font-family: var(--font-sans);
            position: relative;
            min-height: 780px;
            padding-bottom: 80px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        /* ============================================
           HEADER WAVE
           ============================================ */
        .header-wave {
            position: relative;
            padding: 20px 20px 50px;
        }

        .header-wave svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            display: flex;
            justify-content: flex-start;
            width: 100%;
            margin-bottom: 12px;
        }

        .header-top .back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.3s ease;
        }

        .header-top .back-btn:hover {
            transform: translateX(-3px);
        }

        .avatar-wrapper {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.20);
        }

        .avatar-wrapper i {
            font-size: 30px;
            color: var(--success-green);
        }

        .header-content .name {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }

        .header-content .email {
            margin: 2px 0 0;
            font-size: 11px;
            color: #C8E6C9;
        }

        /* ============================================
           CARDS
           ============================================ */
        .card-shadow {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.3s ease, transform 0.2s ease;
            overflow: hidden;
        }

        .card-shadow:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10);
            transform: translateY(-2px);
        }

        /* ============================================
           STATS CARDS
           ============================================ */
        .stat-card {
            flex: 1;
            background: #fff;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10);
        }

        .stat-card .value {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
            color: var(--success-green);
        }

        .stat-card .label {
            margin: 1px 0 0;
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* ============================================
           PREMIUM BANNER
           ============================================ */
        .premium-banner {
            background: var(--orange);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(255, 167, 38, 0.25);
        }

        .premium-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(255, 167, 38, 0.35);
        }

        .premium-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .premium-icon i {
            font-size: 19px;
            color: #993C1D;
        }

        .premium-text {
            flex: 1;
        }

        .premium-text .title {
            margin: 0;
            font-size: 12px;
            font-weight: 500;
            color: #4A1B0C;
        }

        .premium-text .desc {
            margin: 2px 0 0;
            font-size: 10px;
            color: #4A1B0C;
        }

        /* ============================================
           MENU ITEMS
           ============================================ */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-bottom: 0.5px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: #F9FAFB;
            padding-left: 18px;
        }

        .menu-item i:first-child {
            font-size: 18px;
            color: var(--success-green);
            width: 20px;
        }

        .menu-item .label {
            font-size: 13px;
            color: var(--text-primary);
            flex: 1;
        }

        .menu-item .chevron {
            font-size: 15px;
            color: var(--text-muted);
        }

        .menu-item.danger i:first-child {
            color: var(--danger);
        }

        .menu-item.danger .label {
            color: var(--danger);
        }

        /* ============================================
           BOTTOM NAVIGATION - STABIL
           ============================================ */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #fff;
            border-top: 0.5px solid var(--border);
            padding: 10px 0 14px;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
            width: 100%;
            height: 68px;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: color 0.2s ease;
            text-decoration: none;
            background: none;
            border: none;
            font-family: var(--font-sans);
            padding: 0;
            min-width: 48px;
            height: 48px;
            position: relative;
        }

        .nav-item i {
            font-size: 19px;
            color: var(--text-muted);
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 24px;
            width: 24px;
        }

        .nav-item span {
            font-size: 9px;
            color: var(--text-muted);
            transition: color 0.2s ease;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 14px;
            line-height: 14px;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        .nav-item.active i {
            color: var(--success-green);
        }

        .nav-item.active span {
            color: var(--success-green);
            font-weight: 500;
        }

        .nav-item:hover i,
        .nav-item:hover span {
            color: var(--success-green);
        }

        /* ============================================
           TOAST NOTIFICATION
           ============================================ */
        .toast-notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-green);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 999;
            font-family: var(--font-sans);
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 90%;
            text-align: center;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 400px) {
            .app-container {
                border-radius: 24px;
            }

            body {
                padding: 10px;
            }

            .nav-item {
                min-width: 40px;
            }

            .header-wave {
                padding: 16px 16px 40px;
            }
        }

        @media (max-width: 360px) {
            .nav-item {
                min-width: 36px;
            }
            .nav-item i {
                font-size: 17px;
                height: 20px;
                width: 20px;
            }
            .nav-item span {
                font-size: 8px;
                height: 12px;
                line-height: 12px;
            }
            .bottom-nav {
                height: 60px;
                padding: 8px 0 10px;
            }

            .header-wave {
                padding: 14px 14px 35px;
            }

            .avatar-wrapper {
                width: 64px;
                height: 64px;
            }

            .avatar-wrapper i {
                font-size: 24px;
            }
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.6s ease forwards;
        }

        .fade-in:nth-child(2) {
            animation-delay: 0.1s;
        }
        .fade-in:nth-child(3) {
            animation-delay: 0.2s;
        }
        .fade-in:nth-child(4) {
            animation-delay: 0.3s;
        }
    </style>
</head>
<body>

    <!-- ============================================
    APP CONTAINER
    ============================================ -->
    <div class="app-container">

        <!-- ===== HEADER WAVE ===== -->
        <div class="header-wave">
            <svg viewBox="0 0 375 190" preserveAspectRatio="none">
                <path d="M0,0 L375,0 L375,130 C320,160 280,118 220,132 C160,146 120,168 60,150 C30,141 12,132 0,128 Z" fill="#1B5E20"/>
                <path d="M0,0 L375,0 L375,95 C330,118 295,90 240,103 C185,116 150,132 90,116 C55,107 25,96 0,90 Z" fill="#4CAF50" opacity="0.85"/>
            </svg>

            <div class="header-content">
                <div class="header-top">
                    <button class="back-btn" onclick="goBack()">
                        <i class="ti ti-arrow-left" aria-hidden="true"></i>
                    </button>
                </div>
                <div class="avatar-wrapper" onclick="changeAvatar()">
                    <i class="ti ti-user" aria-hidden="true"></i>
                </div>
                <p class="name">Salsabila Putri</p>
                <p class="email">salsabila.putri@email.com</p>
            </div>
        </div>

        <!-- ===== CONTENT ===== -->
        <div style="padding:0 20px 100px; margin-top:-20px; position:relative; z-index:1;">

            <!-- ===== STATS CARDS ===== -->
            <div style="display:flex; gap:10px; margin-bottom:18px;">
                <div class="stat-card fade-in" onclick="viewDetail('Target Kalori')">
                    <p class="value">2,000 kal</p>
                    <p class="label">Target kalori</p>
                </div>
                <div class="stat-card fade-in" style="animation-delay:0.1s;" onclick="viewDetail('Berat Badan')">
                    <p class="value">58 kg</p>
                    <p class="label">Berat badan</p>
                </div>
            </div>

            <!-- ===== PREMIUM BANNER ===== -->
            <div class="premium-banner fade-in" style="animation-delay:0.2s;" onclick="goPremium()">
                <div class="premium-icon">
                    <i class="ti ti-crown" aria-hidden="true"></i>
                </div>
                <div class="premium-text">
                    <p class="title">Langganan premium</p>
                    <p class="desc">Nikmati menu eksklusif dan diskon khusus</p>
                </div>
                <i class="ti ti-chevron-right" style="font-size:16px; color:#4A1B0C;" aria-hidden="true"></i>
            </div>

            <!-- ===== MENU GROUP 1 ===== -->
            <div class="card-shadow fade-in" style="animation-delay:0.3s; margin-bottom:14px; overflow:hidden;">
                <div class="menu-item" onclick="editProfile()">
                    <i class="ti ti-edit" aria-hidden="true"></i>
                    <span class="label">Edit profil</span>
                    <i class="ti ti-chevron-right chevron" aria-hidden="true"></i>
                </div>
                <div class="menu-item" onclick="viewAddresses()">
                    <i class="ti ti-map-pin" aria-hidden="true"></i>
                    <span class="label">Alamat tersimpan</span>
                    <i class="ti ti-chevron-right chevron" aria-hidden="true"></i>
                </div>
                <div class="menu-item" style="border-bottom:none;" onclick="openSettings()">
                    <i class="ti ti-settings" aria-hidden="true"></i>
                    <span class="label">Pengaturan</span>
                    <i class="ti ti-chevron-right chevron" aria-hidden="true"></i>
                </div>
            </div>

            <!-- ===== MENU GROUP 2 ===== -->
            <div class="card-shadow fade-in" style="animation-delay:0.4s; overflow:hidden;">
                <div class="menu-item" onclick="openHelp()">
                    <i class="ti ti-help-circle" aria-hidden="true"></i>
                    <span class="label">Bantuan</span>
                    <i class="ti ti-chevron-right chevron" aria-hidden="true"></i>
                </div>
                <div class="menu-item danger" style="border-bottom:none;" onclick="logout()">
                    <i class="ti ti-logout" aria-hidden="true"></i>
                    <span class="label">Keluar</span>
                </div>
            </div>

        </div>

        <!-- ===== BOTTOM NAVIGATION ===== -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="navigateTo('home')">
                <i class="ti ti-home" aria-hidden="true"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="navigateTo('menu')">
                <i class="ti ti-menu-2" aria-hidden="true"></i>
                <span>Menu</span>
            </button>
            <button class="nav-item" onclick="navigateTo('tracking')">
                <i class="ti ti-chart-bar" aria-hidden="true"></i>
                <span>Tracking</span>
            </button>
            <button class="nav-item" onclick="navigateTo('orders')">
                <i class="ti ti-receipt" aria-hidden="true"></i>
                <span>Pesanan</span>
            </button>
            <button class="nav-item active" onclick="navigateTo('profile')">
                <i class="ti ti-user" aria-hidden="true"></i>
                <span>Profil</span>
            </button>
        </div>

    </div>

    <!-- ============================================
    JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ===== NAVIGATION =====
            window.navigateTo = function(page) {
                const navItems = document.querySelectorAll('.nav-item');
                navItems.forEach(item => {
                    item.classList.remove('active');
                });

                const targetMap = {
                    'home': 0,
                    'menu': 1,
                    'tracking': 2,
                    'orders': 3,
                    'profile': 4
                };

                const index = targetMap[page];
                if (index !== undefined && navItems[index]) {
                    navItems[index].classList.add('active');
                }

                const pageMap = {
                    'home': 'healthymeal_home_organic_v2.html',
                    'menu': 'healthymeal_home_organic_v2.html',
                    'tracking': 'healthymeal_tracking_organic.html',
                    'orders': 'healthymeal_riwayat_pesanan_organic.html',
                    'profile': 'healthymeal_profil_organic.html'
                };

                if (page !== 'profile') {
                    showToast(`📱 Buka halaman ${page.charAt(0).toUpperCase() + page.slice(1)}`);
                    setTimeout(() => {
                        window.location.href = pageMap[page];
                    }, 500);
                }
            };

            // ===== GO BACK =====
            window.goBack = function() {
                showToast('Kembali ke beranda');
                window.location.href = 'healthymeal_home_organic_v2.html';
            };

            // ===== PROFILE ACTIONS =====
            window.changeAvatar = function() {
                showToast('📸 Ubah foto profil');
            };

            window.viewDetail = function(label) {
                showToast(`📊 Detail ${label}`);
            };

            window.goPremium = function() {
                showToast('👑 Buka halaman langganan premium');
                // Could redirect to premium page
            };

            window.editProfile = function() {
                showToast('✏️ Buka halaman edit profil');
                // Could redirect to edit profile page
            };

            window.viewAddresses = function() {
                showToast('📍 Buka daftar alamat tersimpan');
                // Could redirect to addresses page
            };

            window.openSettings = function() {
                showToast('⚙️ Buka halaman pengaturan');
                // Could redirect to settings page
            };

            window.openHelp = function() {
                showToast('❓ Buka halaman bantuan');
                // Could redirect to help page
            };

            window.logout = function() {
                if (confirm('Apakah Anda yakin ingin keluar?')) {
                    showToast('👋 Anda telah keluar dari aplikasi');
                    setTimeout(() => {
                        window.location.href = 'healthymeal_login_register_organic.html';
                    }, 1000);
                }
            };

            // ===== TOAST =====
            function showToast(message) {
                const existingToast = document.querySelector('.toast-notification');
                if (existingToast) {
                    existingToast.remove();
                }

                const toast = document.createElement('div');
                toast.className = 'toast-notification';
                toast.textContent = message;
                document.body.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.style.opacity = '1';
                });

                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                    }, 300);
                }, 2500);
            }

            // ===== KEYBOARD SUPPORT =====
            document.addEventListener('keydown', function(e) {
                if (e.key === 'h' || e.key === 'H') {
                    navigateTo('home');
                } else if (e.key === 'm' || e.key === 'M') {
                    navigateTo('menu');
                } else if (e.key === 't' || e.key === 'T') {
                    navigateTo('tracking');
                } else if (e.key === 'o' || e.key === 'O') {
                    navigateTo('orders');
                } else if (e.key === 'p' || e.key === 'P') {
                    navigateTo('profile');
                } else if (e.key === 'Escape') {
                    goBack();
                } else if (e.key === 'l' || e.key === 'L') {
                    logout();
                }
            });

            // ===== INIT =====
            console.log('🟢 HealthyMeal Profil siap digunakan!');
            console.log('💡 Keyboard shortcuts:');
            console.log('   H - Home | M - Menu | T - Tracking');
            console.log('   O - Pesanan | P - Profil | Escape - Back');
            console.log('   L - Logout');

        })();
    </script>

</body>
</html>
